name: Gateway · PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'services/gateway/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  validate:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@gsebold/gateway

      - name: Lint
        run: pnpm turbo run lint --filter=@gsebold/gateway

      - name: Test
        run: pnpm turbo run test:run --filter=@gsebold/gateway

      - name: Build
        run: pnpm turbo run build --filter=@gsebold/gateway
