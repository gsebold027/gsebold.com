[build]
builder = "RAILPACK"
buildCommand = "pnpm build"
watchPatterns = ["public/**", "src/**", "package.json"]

[deploy]
startCommand = "pnpm preview --host"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.serverless]
enabled = true

[environments.production.variables]
NODE_ENV = "production"

[networking]
serviceName = "landing-page"
